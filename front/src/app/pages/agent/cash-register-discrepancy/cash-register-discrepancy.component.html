<div class="min-h-screen bg-slate-50 p-6">
  <a routerLink="/agent/cash-register" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-slate-700 mb-6">
    ← Retour à la caisse
  </a>
  <h1 class="text-2xl font-semibold text-slate-800 mb-2">Déclarer un écart de caisse</h1>
  <p class="text-sm text-slate-500 mb-6">Signalez un écart entre le solde physique et le solde système.</p>

  <div class="max-w-lg bg-white rounded-xl border border-slate-200 shadow-sm p-6">
    <div *ngIf="caisse() as c" class="mb-6 p-4 bg-slate-50 rounded-lg text-sm">
      <p class="text-slate-500 mb-1">Solde système actuel</p>
      <p class="font-mono font-semibold text-slate-800 text-lg">{{ c.soldeCourant | number:'1.2-2' }} {{ c.devise }}</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">Solde réel constaté <span class="text-rose-500">*</span></label>
        <input type="number" [(ngModel)]="soldeReel" step="0.01"
               class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-primary" />
      </div>

      <div *ngIf="soldeReel !== null" [class]="'rounded-lg px-4 py-3 text-sm font-semibold ' +
        (ecart === 0 ? 'bg-emerald-50 text-emerald-700' :
         ecart > 0 ? 'bg-amber-50 text-amber-700' : 'bg-rose-50 text-rose-700')">
        Écart déclaré : {{ ecart > 0 ? '+' : '' }}{{ ecart | number:'1.2-2' }}
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-600 mb-1">Motif de l'écart <span class="text-rose-500">*</span></label>
        <textarea [(ngModel)]="motif" rows="4"
                  placeholder="Expliquez la cause de l'écart constaté..."
                  class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
      </div>

      <div *ngIf="error()" class="text-rose-600 text-sm bg-rose-50 border border-rose-200 rounded-lg px-4 py-2">{{ error() }}</div>

      <div class="flex gap-3">
        <button (click)="submit()" [disabled]="loading() || soldeReel === null || !motif.trim()"
                class="flex-1 bg-amber-500 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-amber-600 disabled:opacity-50 transition-colors">
          {{ loading() ? 'Envoi…' : 'Déclarer l\'écart' }}
        </button>
        <a routerLink="/agent/cash-register"
           class="flex-1 bg-white border border-slate-200 text-slate-700 py-2.5 rounded-lg text-sm font-medium text-center hover:bg-slate-50">
          Annuler
        </a>
      </div>
    </div>
  </div>
</div>
