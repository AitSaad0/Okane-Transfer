<div class="p-6 bg-slate-50 min-h-screen">
  <div class="max-w-2xl mx-auto">

    <div class="mb-6">
      <a routerLink="/admin/fee-grids" class="text-sm text-secondary hover:text-primary transition-colors">← Retour aux grilles</a>
      <h1 class="text-2xl font-semibold text-slate-800 mt-2">Nouvelle grille tarifaire</h1>
      <p class="text-sm text-slate-500 mt-1">Définir les frais pour un corridor</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">

      @if (error()) {
        <div class="mb-4 p-3 bg-rose-50 border border-rose-200 rounded-lg text-sm text-danger">{{ error() }}</div>
      }

      <!-- AJOUTE [formGroup]="form" ICI -->
      <form [formGroup]="form" class="space-y-6">

        <!-- Corridor -->
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Corridor *</label>
          <select formControlName="corridorId"
                  class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
            <option [ngValue]="null">Sélectionner un corridor</option>
            @for (c of corridors(); track c.id) {
              <option [ngValue]="c.id">{{ c.sourceCountry }} → {{ c.destinationCountry }} ({{ c.sourceCurrencyCode }}/{{ c.destinationCurrencyCode }})</option>
            }
          </select>
        </div>

        <!-- Montant min -->
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Montant min *</label>
          <input type="number" formControlName="montantMin"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
        </div>

        <!-- Montant max -->
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Montant max *</label>
          <input type="number" formControlName="montantMax"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
        </div>

        <!-- Frais fixe -->
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Frais fixe (MAD) *</label>
          <input type="number" formControlName="fraisFixe"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
        </div>

        <!-- Pourcentage frais -->
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Pourcentage frais (%) *</label>
          <input type="number" formControlName="pourcentageFrais"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
        </div>

        <!-- Part agence -->
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Part agence (%) *</label>
          <input type="number" formControlName="partAgence"
                 class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
          <button type="button" (click)="submit()" [disabled]="form.invalid || loading()"
                  class="flex-1 bg-primary text-white text-sm font-medium py-2 rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            {{ loading() ? 'Création...' : 'Créer la grille' }}
          </button>
          <a routerLink="/admin/fee-grids"
             class="flex-1 text-center border border-slate-200 text-slate-600 text-sm font-medium py-2 rounded-lg hover:bg-slate-50 transition-colors">
            Annuler
          </a>
        </div>

      </form> <!-- ← FERMETURE DU FORM -->
    </div>
  </div>
</div>
