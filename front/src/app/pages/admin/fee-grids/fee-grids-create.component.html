<div class="p-6 bg-slate-50 min-h-screen">
  <div class="max-w-2xl mx-auto">

    <div class="mb-6">
      <a routerLink="/admin/fee-grids" class="text-sm text-secondary hover:text-primary transition-colors">← Retour aux grilles</a>
      <h1 class="text-2xl font-semibold text-slate-800 mt-2">Nouvelle grille tarifaire</h1>
      <p class="text-sm text-slate-500 mt-1">Définir les frais par tranches pour un corridor</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">

      @if (error()) {
        <div class="mb-4 p-3 bg-rose-50 border border-rose-200 rounded-lg text-sm text-danger">{{ error() }}</div>
      }

      <div class="space-y-6">

        <!-- Corridor -->
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Corridor *</label>
          <select [formControl]="$any(form.get('corridorId'))"
            class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
            <option [value]="null">Sélectionner un corridor</option>
            @for (c of corridors(); track c.id) {
              <option [value]="c.id">{{ c.sourceCountry }} → {{ c.destinationCountry }} ({{ c.sourceCurrencyCode }}/{{ c.destinationCurrencyCode }})</option>
            }
          </select>
        </div>

        <!-- Tranches -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <label class="text-sm font-medium text-slate-600">Tranches de frais</label>
            <button type="button" (click)="addSlice()"
              class="text-xs font-medium px-3 py-1 rounded-lg border border-primary text-primary hover:bg-indigo-50 transition-colors">
              + Ajouter tranche
            </button>
          </div>

          <div class="space-y-3">
            @for (slice of slices.controls; track $index) {
              <div class="border border-slate-200 rounded-lg p-4 bg-slate-50">
                <div class="flex items-center justify-between mb-3">
                  <span class="text-xs font-medium text-slate-500">Tranche {{ $index + 1 }}</span>
                  @if (slices.length > 1) {
                    <button type="button" (click)="removeSlice($index)"
                      class="text-xs text-danger hover:underline">Supprimer</button>
                  }
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="text-xs text-slate-500 block mb-1">Montant min</label>
                    <input type="number" [formControl]="$any(slice.get('minAmount'))"
                      class="w-full border border-slate-200 rounded px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
                  </div>
                  <div>
                    <label class="text-xs text-slate-500 block mb-1">Montant max</label>
                    <input type="number" [formControl]="$any(slice.get('maxAmount'))"
                      class="w-full border border-slate-200 rounded px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
                  </div>
                  <div>
                    <label class="text-xs text-slate-500 block mb-1">Frais fixes (MAD)</label>
                    <input type="number" [formControl]="$any(slice.get('fixedFee'))"
                      class="w-full border border-slate-200 rounded px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
                  </div>
                  <div class="grid grid-cols-2 gap-2">
                    <div>
                      <label class="text-xs text-slate-500 block mb-1">% Agence</label>
                      <input type="number" [formControl]="$any(slice.get('agencyShare'))"
                        class="w-full border border-slate-200 rounded px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
                    </div>
                    <div>
                      <label class="text-xs text-slate-500 block mb-1">% Centrale</label>
                      <input type="number" [formControl]="$any(slice.get('centralShare'))"
                        class="w-full border border-slate-200 rounded px-3 py-2 text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary bg-white"/>
                    </div>
                  </div>
                </div>
              </div>
            }
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
          <button (click)="submit()" [disabled]="form.invalid || loading()"
            class="flex-1 bg-primary text-white text-sm font-medium py-2 rounded-lg hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            {{ loading() ? 'Création...' : 'Créer la grille' }}
          </button>
          <a routerLink="/admin/fee-grids"
            class="flex-1 text-center border border-slate-200 text-slate-600 text-sm font-medium py-2 rounded-lg hover:bg-slate-50 transition-colors">
            Annuler
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
