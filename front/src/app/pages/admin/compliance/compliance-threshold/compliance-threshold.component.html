<div class="threshold-container">
  <div class="threshold-card">
    <h2>{{ 'COMPLIANCE.TH_TITLE' | translate }}</h2>
    <div class="threshold-info">
      <span class="threshold-label">Current Threshold</span>
      <span class="threshold-value">
        {{ thresholdAmount | number:'1.2-2' }}
      </span>
    </div>
    <div *ngIf="errorMessage" class="alert error">
      {{ errorMessage }}
    </div>
    <div *ngIf="saved" class="alert success">
      ✓ Threshold updated successfully
    </div>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="sarThreshold">{{ 'COMPLIANCE.TH_LABEL' | translate }}</label>
        <input
          id="sarThreshold"
          type="number"
          [(ngModel)]="thresholdAmount"
          name="sarThreshold"
          min="0"
          step="0.01"
          required
        />
      </div>
      <button
        type="submit"
        class="submit-btn"
        [disabled]="loading"
      >
        <span *ngIf="loading">Saving...</span>
        <span *ngIf="saved">✓ Saved</span>
        <span *ngIf="!loading && !saved">{{ 'COMPLIANCE.BTN_UPDATE_TH' | translate }}</span>
      </button>
    </form>
  </div>
</div>
