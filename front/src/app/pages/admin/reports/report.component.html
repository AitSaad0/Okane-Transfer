<div class="report-container">

  <h2>Admin Reports Dashboard</h2>

  <!-- REPORT TYPE -->
  <label>Report Type</label>
  <select [(ngModel)]="reportType">
    <option value="daily">Daily Report</option>
    <option value="monthly">Monthly Report</option>
    <option value="corridor">Corridor Performance</option>
  </select>

  <hr />

  <!-- DAILY -->
  <div *ngIf="reportType === 'daily'">
    <input type="date" [(ngModel)]="date" />
    <input placeholder="Corridor ID (optional)" [(ngModel)]="corridorId" />
    <input placeholder="Agence ID (optional)" [(ngModel)]="agenceId" />
  </div>

  <!-- MONTHLY -->
  <div *ngIf="reportType === 'monthly'">
    <input type="number" placeholder="Year" [(ngModel)]="year" />
  </div>

  <!-- CORRIDOR -->
  <div *ngIf="reportType === 'corridor'">
    <input type="date" [(ngModel)]="startDate" />
    <input type="date" [(ngModel)]="endDate" />
  </div>

  <button (click)="generateReport()">Generate Report</button>

  <div *ngIf="loading">Loading...</div>

  <!-- TABLE -->
  <table *ngIf="data.length > 0">

    <thead>
    <tr>
      <th *ngFor="let key of getKeys(data[0])">
        {{ key }}
      </th>
    </tr>
    </thead>

    <tbody>
    <tr *ngFor="let row of data">
      <td *ngFor="let key of getKeys(row)">
        {{ row[key] }}
      </td>
    </tr>
    </tbody>

  </table>

  <!-- EXPORT -->
  <div *ngIf="data.length > 0 && reportType === 'daily'">
    <button (click)="export('csv')">Export CSV</button>
    <button (click)="export('pdf')">Export PDF</button>
  </div>

</div>
