<div class="p-6 bg-slate-50 min-h-screen">
  <div class="max-w-lg mx-auto">

    <div class="mb-6">
      <a routerLink="/admin/corridors" class="text-sm text-secondary hover:text-primary transition-colors">
        <span>{{ 'CREATE_CORRIDOR.BACK' | translate }}</span>
      </a>
      <h1 class="text-2xl font-semibold text-slate-800 mt-2">{{ 'CREATE_CORRIDOR.TITLE' | translate }}</h1>
      <p class="text-sm text-slate-500 mt-1">{{ 'CREATE_CORRIDOR.SUBTITLE' | translate }}</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">

      @if (error()) {
        <div class="mb-4 p-3 bg-rose-50 border border-rose-200 rounded-lg text-sm text-danger">{{ error() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-medium text-slate-600 block mb-1">{{ 'CREATE_CORRIDOR.SOURCE_COUNTRY' | translate }}</label>
            <select [formControl]="$any(form.get('sourceCountryCode'))"
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
              <option value="">{{ 'CREATE_CORRIDOR.SELECT' | translate }}</option>
              @for (c of countries(); track c.code) {
                <option [value]="c.code">{{ c.name }}</option>
              }
            </select>
          </div>
          
          <div>
            <label class="text-sm font-medium text-slate-600 block mb-1">{{ 'CREATE_CORRIDOR.DEST_COUNTRY' | translate }}</label>
            <select [formControl]="$any(form.get('destinationCountryCode'))"
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
              <option value="">{{ 'CREATE_CORRIDOR.SELECT' | translate }}</option>
              @for (c of countries(); track c.code) {
                <option [value]="c.code">{{ c.name }}</option>
              }
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-medium text-slate-600 block mb-1">{{ 'CREATE_CORRIDOR.SEND_CURRENCY' | translate }}</label>
            <select [formControl]="$any(form.get('sourceCurrencyCode'))"
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
              <option value="">{{ 'CREATE_CORRIDOR.SELECT' | translate }}</option>
              @for (cur of currencies(); track cur.code) {
                <option [value]="cur.code">{{ cur.code }} - {{ cur.name }}</option>
              }
            </select>
          </div>

          <div>
            <label class="text-sm font-medium text-slate-600 block mb-1">{{ 'CREATE_CORRIDOR.REC_CURRENCY' | translate }}</label>
            <select [formControl]="$any(form.get('destinationCurrencyCode'))"
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
              <option value="">{{ 'CREATE_CORRIDOR.SELECT' | translate }}</option>
              @for (cur of currencies(); track cur.code) {
                <option [value]="cur.code">{{ cur.code }} - {{ cur.name }}</option>
              }
            </select>
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-6">
          <button type="button" routerLink="/admin/corridors"
                  class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-lg transition-colors">
            {{ 'CREATE_CORRIDOR.CANCEL' | translate }}
          </button>
          <button type="submit" [disabled]="form.invalid"
                  class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg transition-colors">
            {{ 'CREATE_CORRIDOR.SUBMIT' | translate }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
