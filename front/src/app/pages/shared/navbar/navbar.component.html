<nav class="navbar" *ngIf="auth.isLoggedIn()">
  <div class="navbar__brand">
    <span class="navbar__logo">💸</span>
    <span class="navbar__title">OkaneTransfer</span>
  </div>

  <div class="navbar__actions">
    <div class="navbar__lang">
      <button
        *ngFor="let lang of languages"
        (click)="switchLang(lang)"
        [class.active]="currentLang === lang"
        class="lang-btn">
        {{ lang.toUpperCase() }}
      </button>
    </div>

    <a routerLink="/notifications" class="navbar__notif">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="badge" *ngIf="unreadNotifications > 0">{{ unreadNotifications }}</span>
    </a>

    <div class="navbar__user" (click)="toggleDropdown()">
      <div class="avatar">{{ initials }}</div>
      <div class="navbar__userinfo">
        <span class="navbar__username">{{ user.name }}</span>
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>

      <div class="dropdown" *ngIf="isDropdownOpen">
        <a routerLink="/profile/security" class="dropdown__item">
          {{ 'NAV.PROFILE' | translate }}
        </a>
        <a routerLink="client/notifications/preferences" class="dropdown__item">
          {{ 'Notifications Preferences' | translate }}
        </a>
        <hr>
        <button (click)="logout()" class="dropdown__item dropdown__item--danger">
          {{ 'NAV.LOGOUT' | translate }}
        </button>
      </div>
    </div>
  </div>
</nav>
