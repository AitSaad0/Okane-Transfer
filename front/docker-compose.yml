version: "3.9"

services:
  okane-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: okane-transfer-dev
    ports:
      - "4201:4200"
    volumes:
      - .:/app
      - okane-node_modules:/app/node_modules
      - okane-angular-cache:/app/.angular
    environment:
      - CHOKIDAR_USEPOLLING=true

  okane-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: okane-transfer-prod
    ports:
      - "80:80"
    profiles:
      - prod

volumes:
  okane-node_modules:
  okane-angular-cache:
