name: CI -- Backend Build and Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

env:
  JAVA_VERSION: "17"

jobs:

  # ──────────────────────────────────────────────────────
  # JOB 1 : Build + Tests + JaCoCo coverage
  # ──────────────────────────────────────────────────────
  backend-build:
    name: Build and Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: okane_test
          POSTGRES_USER: okane
          POSTGRES_PASSWORD: okane_test_pass
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Build and run all tests
        run: mvn clean verify -B
        env:
          DB_URL: jdbc:postgresql://localhost:5432/okane_test
          DB_USERNAME: okane
          DB_PASSWORD: okane_test_pass
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          AES_KEY: ${{ secrets.AES_KEY_TEST }}

      - name: Print test results summary
        if: always()
        run: |
          echo "=============================="
          echo "       TEST RESULTS"
          echo "=============================="
          if [ -d "target/surefire-reports" ]; then
            TOTAL=0
            FAILED=0
            ERRORS=0
            SKIPPED=0
            for f in target/surefire-reports/*.xml; do
              [ -f "$f" ] || continue
              t=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1)
              fa=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
              e=$(grep -oP 'errors="\K[0-9]+' "$f" | head -1)
              s=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1)
              TOTAL=$((TOTAL   + ${t:-0}))
              FAILED=$((FAILED + ${fa:-0}))
              ERRORS=$((ERRORS + ${e:-0}))
              SKIPPED=$((SKIPPED + ${s:-0}))
            done
            PASSED=$((TOTAL - FAILED - ERRORS - SKIPPED))
            echo "Total   : $TOTAL"
            echo "Passed  : $PASSED"
            echo "Failed  : $FAILED"
            echo "Errors  : $ERRORS"
            echo "Skipped : $SKIPPED"
            echo "=============================="
            if [ "$FAILED" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "RESULT  : FAILED"
              exit 1
            else
              echo "RESULT  : PASSED"
            fi
          else
            echo "WARNING: no surefire-reports found."
            echo "Make sure tests exist and mvn verify ran successfully."
          fi

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Verify coverage >= 70%
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, sys, os

          path = "target/site/jacoco/jacoco.xml"
          if not os.path.exists(path):
              print("ERROR: jacoco.xml not found -- make sure JaCoCo plugin is in pom.xml")
              sys.exit(1)

          tree = ET.parse(path)
          root = tree.getroot()
          counters = [c for c in root.findall(".//counter")
                      if c.get("type") == "INSTRUCTION"]
          if not counters:
              print("ERROR: no INSTRUCTION counter found in jacoco.xml")
              sys.exit(1)

          c       = counters[0]
          missed  = int(c.get("missed"))
          covered = int(c.get("covered"))
          total   = missed + covered
          pct     = covered / total * 100

          print(f"Lines covered : {covered}/{total}")
          print(f"Coverage      : {pct:.1f}%")

          if pct < 70:
              print(f"FAILED -- {pct:.1f}% is below the required 70%")
              sys.exit(1)

          print("PASSED -- coverage requirement met")
          PYEOF

  # ──────────────────────────────────────────────────────
  # JOB 2 : Docker -- Build check (no push)
  # ──────────────────────────────────────────────────────
  docker-build-check:
    name: Docker -- Build check
    runs-on: ubuntu-latest
    needs: backend-build

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: docker build -t okanetransfer:ci-check .