version: "3.9"

services:

  # ── Base de données ──────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: okane_mysql
    restart: unless-stopped
    env_file:
      - back/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - okane_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot / Tomcat ─────────────────
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: okane-app
    restart: on-failure
    env_file:
      - back/.env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - okane_net

  # ── Frontend Angular ─────────────────────────────
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      target: development        # ← changer en "production" pour prod
    container_name: okane_front
    ports:
      - "4201:4200"
    volumes:
      - ./front:/app
      - okane-node_modules:/app/node_modules
      - okane-angular-cache:/app/.angular
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - okane_net

volumes:
  mysql_data:
  okane-node_modules:
  okane-angular-cache:

networks:
  okane_net:
    driver: bridge